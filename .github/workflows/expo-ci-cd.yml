name: Expo CI/CD

on:
  workflow_dispatch:
    inputs:
      buildType:
        type: choice
        description: "Build type to run"
        options:
          - prod-apk
          - publish-expo
          - all
  push:
    branches: [dev, main]

env:
  EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
  NODE_OPTIONS: --openssl-legacy-provider

jobs:
  check-skip:
    runs-on: ubuntu-latest
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
    steps:
      - name: Skip CI check
        run: echo "Proceeding with workflow"

  test:
    needs: check-skip
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - name: 🏗 Checkout repository
        uses: actions/checkout@v4

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: 📦 Get pnpm store directory
        id: pnpm-cache
        run: |
          echo "pnpm_cache_dir=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: 📦 Setup pnpm cache
        uses: actions/cache@v3
        with:
          path: ${{ steps.pnpm-cache.outputs.pnpm_cache_dir }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: 📦 Install dependencies
        run: pnpm --filter web install

      - name: 🧹 Run ESLint
        run: pnpm --filter web run lint

      - name: 🎨 Run Prettier check
        run: pnpm --filter web run format

  build-and-release:
    needs: test
    if: (github.event_name == 'push' && (github.ref == 'refs/heads/dev' || github.ref == 'refs/heads/main')) || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    defaults:
      run:
        working-directory: ./frontend/mobile
    steps:
      - name: 🏗 Checkout repository
        uses: actions/checkout@v4

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: 📦 Get pnpm store directory
        id: pnpm-cache
        run: |
          echo "pnpm_cache_dir=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: 📦 Setup pnpm cache
        uses: actions/cache@v3
        with:
          path: ${{ steps.pnpm-cache.outputs.pnpm_cache_dir }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: 📦 Install dependencies
        run: pnpm --filter mobile install

      - name: 🏗 Setup EAS CLI
        run: npm install -g eas-cli@latest

      - name: 📱 Setup EAS build cache
        uses: actions/cache@v3
        with:
          path: ~/.eas-build-local
          key: ${{ runner.os }}-eas-build-local-${{ hashFiles('**/package.json', '**/app.json') }}
          restore-keys: |
            ${{ runner.os }}-eas-build-local-

      - name: 🏗 Build shared library
        run: pnpm --filter shared build

      - name: 🔧 Setup google-services.json
        run: |
          echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > google-services.json
          echo "✅ Created google-services.json in project root"

          # 파일이 생성되었는지 확인
          if [ -f google-services.json ]; then
            echo "✓ google-services.json exists in project root"
            echo "File size: $(wc -c < google-services.json) bytes"
          else
            echo "❌ google-services.json NOT found in project root"
            exit 1
          fi

      - name: 🔄 Verify EAS CLI installation
        run: |
          echo "EAS CLI version:"
          eas --version

          # 누락된 패키지 수동 설치
          npx expo install expo-modules-autolinking expo-modules-core expo-asset

          # Expo 의존성 정리 및 재설치
          npx expo install --fix
        env:
          EXPO_PUBLIC_KAKAO_NATIVE_APP_KEY: ${{ secrets.EXPO_PUBLIC_KAKAO_NATIVE_APP_KEY }}
          EXPO_PUBLIC_PROJECT_ID: ${{ secrets.EXPO_PUBLIC_PROJECT_ID }}

      - name: 📋 Update metro.config.js for SVG support
        run: |
          if [ -f ./metro.config.js ]; then
            echo "Creating backup of metro.config.js"
            cp ./metro.config.js ./metro.config.js.backup
            echo "Updating metro.config.js to CommonJS format"
            cat > ./metro.config.js << 'EOFMARKER'
          /* eslint-disable @typescript-eslint/no-var-requires */
          const { getDefaultConfig } = require('expo/metro-config');

          const config = getDefaultConfig(__dirname);

          const { transformer, resolver } = config;

          config.transformer = {
            ...transformer,
            babelTransformerPath: require.resolve('react-native-svg-transformer/expo'),
          };

          config.resolver = {
            ...resolver,
            assetExts: resolver.assetExts.filter(ext => ext !== 'svg'),
            sourceExts: [...resolver.sourceExts, 'svg'],
          };

          module.exports = config;
          EOFMARKER
            echo "metro.config.js updated to CommonJS format"
          else
            echo "metro.config.js not found"
          fi
      
      - name: 📱 Build Development APK (for dev branch)
        if: (github.event_name == 'push' && github.ref == 'refs/heads/dev') || github.event.inputs.buildType == 'all'
        run: |
          export NODE_OPTIONS="--openssl-legacy-provider --max_old_space_size=4096"

          echo "🔍 [INFO] Building with EAS..."
          echo "  - .easignore will include google-services.json in archive"
          echo "  - EAS will automatically run prebuild"
          echo "  - googleServicesFile config will copy to android/app/"

          eas build --platform android --profile development --local --non-interactive --output=./app-dev.apk

          echo ""
          echo "✅ Build completed! Verifying Google Services integration..."
          echo ""

          # APK 내부의 Firebase/Google Services 관련 파일 확인
          echo "📦 Checking APK contents for Firebase resources:"
          if unzip -l app-dev.apk | grep -i "google.*firebase\|firebase\|google.*services" | head -10; then
            echo "✓ Found Firebase/Google Services files in APK"
          else
            echo "⚠️ No obvious Firebase files found (this might be OK if they're compiled into resources)"
          fi

          echo ""
          echo "📦 Checking for Google Services generated values:"
          # Google Services Plugin이 성공적으로 실행되면 values.xml에 Firebase 설정이 들어감
          if unzip -l app-dev.apk | grep -E "res/values.*\.xml" | head -5; then
            echo "✓ Resource values found in APK (Google Services Plugin likely ran successfully)"
          else
            echo "⚠️ No resource values found"
          fi

          echo ""
          echo "📦 Checking AndroidManifest.xml settings:"
          # AndroidManifest.xml에서 allowBackup 설정 확인
          if command -v aapt &> /dev/null; then
            echo "Using aapt to check AndroidManifest.xml..."
            if aapt dump xmltree app-dev.apk AndroidManifest.xml | grep -i "allowBackup"; then
              echo "✓ allowBackup setting found in manifest"
            else
              echo "⚠️ allowBackup setting not found in manifest"
            fi
          else
            echo "⚠️ aapt not available, skipping AndroidManifest.xml check"
            echo "Attempting alternative check with unzip..."
            if unzip -p app-dev.apk AndroidManifest.xml 2>/dev/null | strings | grep -i "allowBackup"; then
              echo "✓ Found allowBackup reference in manifest"
            else
              echo "⚠️ Could not verify allowBackup setting"
            fi
          fi

          echo ""
          echo "📦 APK file size: $(du -h app-dev.apk | cut -f1)"
        env:
          NODE_ENV: development
          EXPO_PUBLIC_KAKAO_NATIVE_APP_KEY: ${{ secrets.EXPO_PUBLIC_KAKAO_NATIVE_APP_KEY }}
          EXPO_PUBLIC_PROJECT_ID: ${{ secrets.EXPO_PUBLIC_PROJECT_ID }}

      - name: 📱 Build Production APK (for main branch)
        if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event.inputs.buildType == 'prod-apk'
        run: |
          export NODE_OPTIONS="--openssl-legacy-provider --max_old_space_size=4096"

          echo "🔍 [INFO] Building with EAS..."
          echo "  - .easignore will include google-services.json in archive"
          echo "  - EAS will automatically run prebuild"
          echo "  - googleServicesFile config will copy to android/app/"

          eas build --platform android --profile production-apk --local --non-interactive --output=./app-prod.apk
        env:
          NODE_ENV: production
          EXPO_PUBLIC_KAKAO_NATIVE_APP_KEY: ${{ secrets.EXPO_PUBLIC_KAKAO_NATIVE_APP_KEY }}
          EXPO_PUBLIC_PROJECT_ID: ${{ secrets.EXPO_PUBLIC_PROJECT_ID }}

      - name: 🚀 Publish to Expo
        if: github.event.inputs.buildType == 'all' || github.event.inputs.buildType == 'publish-expo'
        run: |
          eas update --auto
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: 🏷️ Generate build information
        id: build-info
        run: |
          VERSION=$(grep -oP 'version:\s*"\K[^"]+' app.config.js | head -1)
          BUILD_NUMBER=$(date +%Y%m%d%H%M)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "build_number=$BUILD_NUMBER" >> $GITHUB_OUTPUT
          # Generate changelog from commit messages since last tag
          if git describe --tags --abbrev=0 > /dev/null 2>&1; then
            LAST_TAG=$(git describe --tags --abbrev=0)
            git log $LAST_TAG..HEAD --pretty=format:"- %s" > changelog.md
          else
            git log --pretty=format:"- %s" -n 10 > changelog.md
          fi

      - name: 📝 Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          draft: true
          name: "Release v${{ steps.build-info.outputs.version }}-${{ steps.build-info.outputs.build_number }} (${{ github.ref == 'refs/heads/dev' && 'Dev' || 'Production' }})"
          tag_name: "v${{ steps.build-info.outputs.version }}-${{ steps.build-info.outputs.build_number }}-${{ github.ref == 'refs/heads/dev' && 'dev' || 'prod' }}"
          files: |
            ./frontend/mobile/app-*.apk
          body_path: ./frontend/mobile/changelog.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: 📦 Upload build artifacts to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: app-builds
          path: |
            ./frontend/mobile/app-*.apk
          retention-days: 7
