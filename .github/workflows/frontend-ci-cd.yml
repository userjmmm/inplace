name: Frontend CI/CD for main branches
on:
  push:
    branches:
      - '**'
    paths:
      - 'frontend/**'
      - '.github/**'
jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
      - name: Install dependencies
        run: npm install
      - name: Run ESLint
        run: npm run lint
      - name: Run Prettier
        run: npm run format -- --check
      - name: Run Tests
        run: npm test

  sync-fork:
    if: github.ref == 'refs/heads/test/build-workflow'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
        with:
          fetch-depth: 0  # 전체 히스토리를 가져옴
          ref: test/result  # test/result 브랜치를 먼저 checkout
      
      # build.sh 실행
      - name: creates output
        working-directory: frontend
        run: sh build.sh

      # 디버깅을 위한 경로와 구조 확인
      - name: Debug directory structure
        run: |
          echo "Before move - directory structure:"
          ls -la
          ls -la output/
      
      # output의 내용을 루트로 이동
      - name: Move output contents
        run: |
          cp -rf output/* .
          rm -rf output
          
          echo "After move - final structure:"
          ls -la

      # test/result 브랜치에 직접 커밋
      - name: Commit and push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add -A
          git status  # 디버깅용
          git commit -m "test: build.sh 결과물 테스트" || echo "No changes to commit"
          git push origin HEAD:test/result